<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>buwat tita cayangnya indiya</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#dbeafe,#fff7c2);
overflow:hidden;
}

.card{
width:360px;
background:rgba(255,255,255,.85);
backdrop-filter:blur(12px);
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.15);
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

#emoji{
font-size:60px;
margin-bottom:15px;
}

h1{
color:#ff4f87;
margin-bottom:15px;
}

p{
font-size:18px;
color:#555;
line-height:1.6;
min-height:90px;
}

small{
display:block;
margin-top:20px;
color:#888;
}
</style>

</head>
<body>

<div class="card">
<div id="emoji">☀️</div>
<h1 id="title"></h1>
<p id="text"></p>
<small id="clock"></small>
</div>

<script>

const data={
morning:{
emoji:"☀️",
title:"Good morning cayaang<3",
text:[
"Semoga hari ini kamu senyum teyus iaah<3",
"Cemangaaaaaat cekuyahnya 
  -yur waif yg gemoi",
"Ingat yah, kamu gemoi, gantenk, keyen, aku sukakk",
"Ini bukan kata kata dari jipiti ya babi😡😡, mentang mentang kapital",
"Ada indiya yang menunggu km dimasa depan, semangay:3",
"LOVYU BANGETTTTT",
"AKU SAYANG KAMU",
"tiyta gemoi imup gemes atu tayang banet:p"
]
},

afternoon:{
emoji:"🍱",
title:"Siank sayankk:3",
text:[
"jangan lupa mam cayang, jangan lupa ingetin aku mam juga yaah:p",
"semangat walaw kelasmu panash🩷🩷😔(kelasku berase)",
"uda embege blum sih..",
"semangatt bbyyyyy, mwa mwaa o3o",
"ingetin aku tyum kamu nanti",
"kangen aku yaah:q"
]
},

evening:{
emoji:"☕",
title:"Yeiyyy soree:q",
text:[
"YEYY PUYANG CEKUYAHH",
"jangan lupa bekabarrr yaaa cayanggku",
"kalo ada yang mau diceritain, ceritainn padaku yyyaahh",
"jangan lupa istirahatt",
"jangan lupa mammm,nyamnyam"
]
},

night:{
emoji:"🌙",
title:"Gut naittt<3",
text:[
"Sleep well yaa cayangkuu<3",
"sweet dreams cayaaangg, semoga mimpiin adik:q",
"wenya peluk",
"wenya kelonan",
"wenya cium cium sebelum bubuk",
"bubuk nyenyakkk cayaangg",
"bismikaallahumaahyawabismikaamut"
]
}
}

const hour=new Date().getHours();
let greet;

if(hour>=5&&hour<11) greet=data.morning;
else if(hour>=11&&hour<15) greet=data.afternoon;
else if(hour>=15&&hour<18) greet=data.evening;
else greet=data.night;

document.getElementById("emoji").innerHTML=greet.emoji;
document.getElementById("title").innerHTML=greet.title;
document.getElementById("text").innerHTML=greet.text[Math.floor(Math.random()*greet.text.length)];

function jam(){
const now=new Date();
document.getElementById("clock").innerHTML=
now.toLocaleTimeString("id-ID");
}
setInterval(jam,1000);
jam();

</script>

</body>
</html>
